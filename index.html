<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solar System</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #020817;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    #solar-system {
      position: relative;
      width: 920px;
      height: 920px;
      flex-shrink: 0;
    }

    .orbit-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.055);
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    #sun {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background-image: url('images/sun.jpg');
      background-size: cover;
      background-repeat: repeat-x;
      background-position: 0px 50%;
      box-shadow:
        0 0 18px 7px rgba(255, 210, 0, 0.85),
        0 0 55px 22px rgba(255, 140, 0, 0.42),
        0 0 110px 45px rgba(255, 70, 0, 0.18);
      z-index: 10;
    }

    .planet-anchor {
      position: absolute;
      top: 50%;
      left: 50%;
      pointer-events: none;
    }

    .saturn-ring {
      position: absolute;
      top: 0;
      left: 0;
      border-radius: 50%;
      border: 8px solid rgba(195, 175, 95, 0.55);
      outline: 4px solid rgba(195, 175, 95, 0.2);
      box-shadow: inset 0 0 0 4px rgba(195, 175, 95, 0.15), 0 0 0 3px rgba(160, 140, 60, 0.3);
      transform: translate(-50%, -50%) scaleY(0.26);
      pointer-events: none;
      z-index: 4;
    }

    .planet {
      position: absolute;
      top: 0;
      left: 0;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: all;
      z-index: 5;
      box-shadow: inset -2px -2px 5px rgba(0,0,0,0.45), 0 2px 10px rgba(0,0,0,0.55);
    }

    .planet:hover {
      filter: brightness(1.4) drop-shadow(0 0 7px rgba(255, 255, 255, 0.55));
    }

    .note-label {
      position: absolute;
      top: 0;
      left: 0;
      color: rgba(255, 255, 255, 0.82);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.3px;
      white-space: nowrap;
      pointer-events: none;
      z-index: 6;
      text-shadow: 0 0 6px rgba(0,0,0,0.9);
    }

    /* ── Control Panel ────────────────────────────────────────────────────── */
    #control-panel {
      position: fixed;
      bottom: 22px;
      left: 22px;
      z-index: 900;
      background: rgba(6, 11, 26, 0.94);
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 13px;
      padding: 15px 19px;
      color: #bccde8;
      font-size: 13px;
      line-height: 1.65;
      box-shadow: 0 10px 36px rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(12px);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .cp-title {
      font-size: 11px;
      color: #ffffff;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .cp-row {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      color: #bccde8;
      font-size: 13px;
    }

    .cp-row input[type="checkbox"] {
      accent-color: #5588ff;
      width: 14px;
      height: 14px;
      cursor: pointer;
    }

    .cp-row input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 90px;
      height: 3px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.15);
      outline: none;
      cursor: pointer;
    }

    .cp-row input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: #5588ff;
      cursor: pointer;
    }

    .cp-slider-label {
      font-size: 11px;
      color: #bccde8;
    }

    .cp-divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.07);
      margin: 3px 0;
    }

    .cp-wave-select {
      margin-left: auto;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 5px;
      color: #bccde8;
      font-size: 11px;
      padding: 2px 4px;
      cursor: pointer;
      outline: none;
    }

    .cp-wave-select:hover {
      background: rgba(255,255,255,0.12);
    }
  </style>
</head>
<body>

<canvas id="stars"></canvas>

<div id="solar-system">
  <div id="sun"></div>
</div>

<div id="control-panel">
  <div class="cp-title">Kepler's Spheres</div>
  <label class="cp-row" id="all-row">
    <input type="checkbox" id="all-mute" checked>
    <span>All planets</span>
    <select class="cp-wave-select" id="all-wave">
      <option value="flute">Flute</option>
      <option value="violin">Violin</option>
      <option value="organ">Organ</option>
      <option value="clarinet">Clarinet</option>
      <option value="horn">French Horn</option>
      <option value="cello">Cello</option>
      <option value="oboe">Oboe</option>
      <option value="theremin">Theremin</option>
      <option value="trumpet">Trumpet</option>
      <option value="lute">Lute</option>
    </select>
  </label>
  <hr class="cp-divider">
  <div id="planet-mutes"></div>
  <hr class="cp-divider">
  <label class="cp-row">
    <span>Speed</span>
    <span class="cp-slider-label">slow</span>
    <input type="range" id="speed-slider" min="1" max="10" value="5" step="1">
    <span class="cp-slider-label">fast</span>
  </label>
</div>

<script>
const PLANET_SIZE_SCALE = 2.5;

const PLANETS = [
  {
    name: 'Mercury', instrument: 'flute',
    orbitalDays: 87.97, orbitR: 72, size: 6 * PLANET_SIZE_SCALE,
    solarDayHours: 4222.6,
    img: 'images/mercury.jpg',
    lowNote:  { name: 'A4',  freq: 440.00 },
    highNote: { name: 'C6',  freq: 1046.50 },
  },
  {
    name: 'Venus', instrument: 'violin',
    orbitalDays: 224.70, orbitR: 110, size: 10 * PLANET_SIZE_SCALE,
    solarDayHours: 2802.0,
    img: 'images/venus.jpg',
    lowNote:  { name: 'E4',  freq: 329.63 },
    highNote: { name: 'E4',  freq: 329.63 },
  },
  {
    name: 'Earth', instrument: 'organ',
    orbitalDays: 365.25, orbitR: 150, size: 10 * PLANET_SIZE_SCALE,
    solarDayHours: 24.0,
    img: 'images/earth.jpg',
    lowNote:  { name: 'E4',  freq: 329.63 },
    highNote: { name: 'F4',  freq: 349.23 },
  },
  {
    name: 'Mars', instrument: 'clarinet',
    orbitalDays: 686.97, orbitR: 192, size: 8 * PLANET_SIZE_SCALE,
    solarDayHours: 24.6598,
    img: 'images/mars.jpg',
    lowNote:  { name: 'F3',  freq: 174.61 },
    highNote: { name: 'C4',  freq: 261.63 },
  },
  {
    name: 'Jupiter', instrument: 'horn',
    orbitalDays: 4332.59, orbitR: 248, size: 22 * PLANET_SIZE_SCALE,
    solarDayHours: 9.9250,
    img: 'images/jupiter.jpg',
    lowNote:  { name: 'G3',  freq: 196.00 },
    highNote: { name: 'Bb3', freq: 233.08 },
  },
  {
    name: 'Saturn', instrument: 'cello',
    orbitalDays: 10759.22, orbitR: 305, size: 18 * PLANET_SIZE_SCALE, hasRing: true,
    solarDayHours: 10.6562,
    img: 'images/saturn.jpg',
    lowNote:  { name: 'G3',  freq: 196.00 },
    highNote: { name: 'B3',  freq: 246.94 },
  },
];

// ── Instrument definitions ────────────────────────────────────────────────────
// imag[n] = amplitude of nth harmonic (index 0 = DC, index 1 = fundamental)
const INSTRUMENTS = {
  flute:    { label: 'Flute',       imag: [0, 1, 0.25, 0.03, 0.01],                              cutoff: 2200 },
  violin:   { label: 'Violin',      imag: [0, 1, 0.5, 0.3, 0.2, 0.1, 0.07, 0.05, 0.03, 0.02],  cutoff: 2800 },
  organ:    { label: 'Organ',       imag: [0, 1, 0.5, 0.33, 0.25, 0.1, 0.08, 0.05, 0.03],       cutoff: 1800 },
  clarinet: { label: 'Clarinet',    imag: [0, 1, 0.05, 0.5, 0.02, 0.2, 0.01, 0.1, 0.0, 0.05],  cutoff: 1400 },
  horn:     { label: 'French Horn', imag: [0, 1, 0.6, 0.5, 0.35, 0.25, 0.18, 0.12, 0.08, 0.05],cutoff: 1600 },
  cello:    { label: 'Cello',       imag: [0, 1, 0.7, 0.45, 0.2, 0.1, 0.06, 0.03],              cutoff: 1200 },
  oboe:     { label: 'Oboe',        imag: [0, 1, 0.7, 0.5, 0.3, 0.2, 0.1, 0.07, 0.05],          cutoff: 2000 },
  theremin: { label: 'Theremin',    imag: [0, 1],                                                 cutoff: null, vibrato: true },
  trumpet:  { label: 'Trumpet',     imag: [0, 1, 0.4, 0.6, 0.3, 0.4, 0.2, 0.1, 0.15, 0.05],    cutoff: 2400 },
  lute:     { label: 'Lute',        imag: [0, 1, 0.6, 0.3, 0.1, 0.04, 0.01],                    cutoff: 1600 },
};

// ── Note lookup table ─────────────────────────────────────────────────────────
const NOTE_TABLE = [
  {name:'A2', freq:110.00}, {name:'Bb2',freq:116.54}, {name:'B2', freq:123.47},
  {name:'C3', freq:130.81}, {name:'Db3',freq:138.59}, {name:'D3', freq:146.83},
  {name:'Eb3',freq:155.56}, {name:'E3', freq:164.81}, {name:'F3', freq:174.61},
  {name:'Gb3',freq:185.00}, {name:'G3', freq:196.00}, {name:'Ab3',freq:207.65},
  {name:'A3', freq:220.00}, {name:'Bb3',freq:233.08}, {name:'B3', freq:246.94},
  {name:'C4', freq:261.63}, {name:'Db4',freq:277.18}, {name:'D4', freq:293.66},
  {name:'Eb4',freq:311.13}, {name:'E4', freq:329.63}, {name:'F4', freq:349.23},
  {name:'Gb4',freq:369.99}, {name:'G4', freq:392.00}, {name:'Ab4',freq:415.30},
  {name:'A4', freq:440.00}, {name:'Bb4',freq:466.16}, {name:'B4', freq:493.88},
  {name:'C5', freq:523.25}, {name:'D5', freq:587.33}, {name:'E5', freq:659.26},
  {name:'F5', freq:698.46}, {name:'G5', freq:783.99}, {name:'A5', freq:880.00},
  {name:'B5', freq:987.77}, {name:'C6', freq:1046.50},
];

function nearestNote(freq) {
  let best = NOTE_TABLE[0];
  let bestDiff = Math.abs(Math.log2(freq / best.freq));
  for (const n of NOTE_TABLE) {
    const diff = Math.abs(Math.log2(freq / n.freq));
    if (diff < bestDiff) { bestDiff = diff; best = n; }
  }
  return best.name;
}

const ORBIT_Y_RATIO   = 0.55;
const MERCURY_MS      = 30_000;
const MS_PER_ORBD     = MERCURY_MS / PLANETS[0].orbitalDays;
let   speedMultiplier = 5;

// ── Stars ────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('stars');
const ctx    = canvas.getContext('2d');

function drawStars() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let i = 0; i < 240; i++) {
    const x = Math.random() * canvas.width;
    const y = Math.random() * canvas.height;
    const r = Math.random() * 1.1 + 0.2;
    const a = Math.random() * 0.65 + 0.2;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${a})`;
    ctx.fill();
  }
}
drawStars();

// ── Responsive scale ─────────────────────────────────────────────────────────
const sys = document.getElementById('solar-system');

function resize() {
  const scale = Math.min(window.innerWidth, window.innerHeight) / 940;
  sys.style.transform = `scale(${Math.min(1, scale)})`;
}
resize();
window.addEventListener('resize', () => { resize(); drawStars(); });

// ── Build DOM ─────────────────────────────────────────────────────────────────
const orbitRings = PLANETS.map(p => {
  const ring = document.createElement('div');
  ring.className = 'orbit-ring';
  ring.style.width  = p.orbitR * 2 + 'px';
  ring.style.height = p.orbitR * 2 * ORBIT_Y_RATIO + 'px';
  sys.appendChild(ring);
  return ring;
});

const planetNodes = PLANETS.map((p) => {
  const anchor = document.createElement('div');
  anchor.className = 'planet-anchor';

  if (p.hasRing) {
    const ringEl = document.createElement('div');
    ringEl.className = 'saturn-ring';
    const rw = p.size * 2.7;
    ringEl.style.width  = rw + 'px';
    ringEl.style.height = rw + 'px';
    anchor.appendChild(ringEl);
  }

  const planet = document.createElement('div');
  planet.className = 'planet';
  planet.style.width  = p.size + 'px';
  planet.style.height = p.size + 'px';
  if (p.img) {
    planet.style.backgroundImage    = `url('${p.img}')`;
    planet.style.backgroundSize     = 'cover';
    planet.style.backgroundRepeat   = 'repeat-x';
    planet.style.backgroundPosition = '0px 50%';
  } else {
    planet.style.background = p.bg;
  }
  anchor.appendChild(planet);

  const noteLabel = document.createElement('span');
  noteLabel.className = 'note-label';
  noteLabel.style.transform = `translate(-50%, calc(-100% - ${p.size / 2 + 8}px))`;
  noteLabel.textContent = p.lowNote.name;
  anchor.appendChild(noteLabel);

  sys.appendChild(anchor);

  const initialAngle = -Math.PI / 2;
  const spinDurMs    = Math.max(3000, Math.min(60000, p.solarDayHours / 24 * 8000));
  const spinPxPerMs  = p.img ? p.size / spinDurMs : 0;

  return { anchor, planet, noteLabel, initialAngle, p, spinPxPerMs, rotOffset: 0 };
});

// ── Audio setup ───────────────────────────────────────────────────────────────
const audioCtx   = new (window.AudioContext || window.webkitAudioContext)();
const TARGET_GAIN = 0.07;

// Smooth gain ramp — exponential cannot reach 0, so clamp to 0.0001
function rampGain(param, target, dur = 0.08) {
  param.cancelScheduledValues(audioCtx.currentTime);
  param.setValueAtTime(param.value, audioCtx.currentTime);
  param.exponentialRampToValueAtTime(Math.max(target, 0.0001), audioCtx.currentTime + dur);
}

// Algorithmic reverb: exponentially decaying white noise impulse response
function makeReverbIR(ctx, duration = 2.5, decay = 2.0) {
  const len = Math.floor(ctx.sampleRate * duration);
  const ir  = ctx.createBuffer(2, len, ctx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = ir.getChannelData(ch);
    for (let i = 0; i < len; i++)
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, decay);
  }
  return ir;
}

// Shared reverb bus: planets → preReverbGain → [dry | convolver → wet] → destination
const convolver      = audioCtx.createConvolver();
convolver.buffer     = makeReverbIR(audioCtx);
const preReverbGain  = audioCtx.createGain();  preReverbGain.gain.value = 0.8;
const dryGain        = audioCtx.createGain();  dryGain.gain.value       = 0.6;
const wetGain        = audioCtx.createGain();  wetGain.gain.value       = 0.4;
preReverbGain.connect(dryGain);
preReverbGain.connect(convolver);
convolver.connect(wetGain);
dryGain.connect(audioCtx.destination);
wetGain.connect(audioCtx.destination);

// Apply an instrument profile to a planet node
function applyInstrument(node, instName) {
  const inst = INSTRUMENTS[instName];
  const arr  = new Float32Array(inst.imag.length);
  const wave = audioCtx.createPeriodicWave(arr, new Float32Array(inst.imag), { disableNormalization: false });
  node.oscillator.setPeriodicWave(wave);
  if (node.filter && inst.cutoff) node.filter.frequency.value = inst.cutoff;
  if (node.lfoGain) node.lfoGain.gain.value = inst.vibrato ? 8 : 0;
  node.currentInstrument = instName;
}

planetNodes.forEach((node) => {
  const { p } = node;

  const osc  = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  gain.gain.value = TARGET_GAIN;

  // Low-pass filter per planet (cutoff set by instrument)
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 1800;
  filter.Q.value = 0.7;

  // LFO for vibrato (active for theremin and other vibrato instruments)
  const lfo     = audioCtx.createOscillator();
  const lfoGain = audioCtx.createGain();
  lfo.frequency.value = 4.5;
  lfoGain.gain.value  = 0;
  lfo.connect(lfoGain);
  lfoGain.connect(osc.detune);
  lfo.start();

  osc.frequency.value = p.lowNote.freq;
  osc.connect(gain);
  gain.connect(filter);
  filter.connect(preReverbGain);
  osc.start();

  node.oscillator = osc;
  node.gainNode   = gain;
  node.filter     = filter;
  node.lfo        = lfo;
  node.lfoGain    = lfoGain;

  applyInstrument(node, p.instrument);
});

document.addEventListener('click', () => {
  if (audioCtx.state === 'suspended') audioCtx.resume();
});

// ── Animation loop ────────────────────────────────────────────────────────────
const sunEl      = document.getElementById('sun');
const SUN_SIZE   = 50;
const SUN_DUR_MS = 216_000;
let   sunRotOffset = 0;

let virtualElapsed = 0;
let lastFrameTime  = performance.now();

function frame(now) {
  const dt = now - lastFrameTime;
  lastFrameTime   = now;
  virtualElapsed += dt * speedMultiplier;

  sunRotOffset = (sunRotOffset + dt * speedMultiplier * (SUN_SIZE * 2) / SUN_DUR_MS) % (SUN_SIZE * 2);
  sunEl.style.backgroundPosition = `${-sunRotOffset}px 50%`;

  planetNodes.forEach((node) => {
    const { anchor, planet, noteLabel, initialAngle, p } = node;
    const periodMs = p.orbitalDays * MS_PER_ORBD;
    const angle    = initialAngle + (virtualElapsed / periodMs) * Math.PI * 2;
    const x        = Math.cos(angle) * p.orbitR;
    const y        = Math.sin(angle) * p.orbitR * ORBIT_Y_RATIO;

    anchor.style.transform = `translate(${x}px, ${y}px)`;

    if (node.spinPxPerMs) {
      node.rotOffset = (node.rotOffset + dt * speedMultiplier * node.spinPxPerMs) % (p.size * 2);
      planet.style.backgroundPosition = `${-node.rotOffset}px 50%`;
    }

    // Update pitch: t=0 at top (aphelion-like), t=1 at bottom; sine maps orbit to [0,1]
    const t    = (Math.sin(angle) + 1) / 2;
    const freq = p.lowNote.freq + (p.highNote.freq - p.lowNote.freq) * t;
    node.oscillator.frequency.linearRampToValueAtTime(freq, audioCtx.currentTime + 0.05);

    const noteName = nearestNote(freq);
    if (noteLabel.textContent !== noteName) noteLabel.textContent = noteName;
  });

  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);

// ── Control Panel ─────────────────────────────────────────────────────────────
const mutesContainer = document.getElementById('planet-mutes');

planetNodes.forEach((node) => {
  const label = document.createElement('label');
  label.className = 'cp-row';

  const cb = document.createElement('input');
  cb.type    = 'checkbox';
  cb.checked = true;
  cb.addEventListener('change', () => {
    rampGain(node.gainNode.gain, cb.checked ? TARGET_GAIN : 0.0001, cb.checked ? 0.08 : 0.05);
  });

  const span = document.createElement('span');
  span.textContent = node.p.name;

  const sel = document.createElement('select');
  sel.className = 'cp-wave-select';
  Object.entries(INSTRUMENTS).forEach(([val, def]) => {
    const opt = document.createElement('option');
    opt.value = val;
    opt.textContent = def.label;
    sel.appendChild(opt);
  });
  sel.value = node.p.instrument;
  sel.addEventListener('change', () => {
    applyInstrument(node, sel.value);
  });

  node.muteCheckbox = cb;
  node.waveSelect   = sel;

  label.appendChild(cb);
  label.appendChild(span);
  label.appendChild(sel);
  mutesContainer.appendChild(label);
});

document.getElementById('all-mute').addEventListener('change', function () {
  planetNodes.forEach((node) => {
    node.muteCheckbox.checked = this.checked;
    rampGain(node.gainNode.gain, this.checked ? TARGET_GAIN : 0.0001, this.checked ? 0.08 : 0.05);
  });
});

document.getElementById('all-wave').addEventListener('change', function () {
  planetNodes.forEach((node) => {
    applyInstrument(node, this.value);
    node.waveSelect.value = this.value;
  });
});

document.getElementById('speed-slider').addEventListener('input', function () {
  speedMultiplier = parseInt(this.value);
});
</script>

</body>
</html>
