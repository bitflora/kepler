<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solar System</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #020817;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    #solar-system {
      position: relative;
      width: 920px;
      height: 920px;
      flex-shrink: 0;
    }

    .orbit-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.055);
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    #sun {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background-image: url('images/sun.jpg');
      background-size: cover;
      background-repeat: repeat-x;
      background-position: 0px 50%;
      box-shadow:
        0 0 18px 7px rgba(255, 210, 0, 0.85),
        0 0 55px 22px rgba(255, 140, 0, 0.42),
        0 0 110px 45px rgba(255, 70, 0, 0.18);
      z-index: 10;
    }

    .planet-anchor {
      position: absolute;
      top: 50%;
      left: 50%;
      pointer-events: none;
    }

    .saturn-ring {
      position: absolute;
      top: 0;
      left: 0;
      border-radius: 50%;
      border: 8px solid rgba(195, 175, 95, 0.55);
      outline: 4px solid rgba(195, 175, 95, 0.2);
      box-shadow: inset 0 0 0 4px rgba(195, 175, 95, 0.15), 0 0 0 3px rgba(160, 140, 60, 0.3);
      transform: translate(-50%, -50%) scaleY(0.26);
      pointer-events: none;
      z-index: 4;
    }

    .planet {
      position: absolute;
      top: 0;
      left: 0;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: all;
      z-index: 5;
      box-shadow: inset -2px -2px 5px rgba(0,0,0,0.45), 0 2px 10px rgba(0,0,0,0.55);
    }

    .planet:hover {
      filter: brightness(1.4) drop-shadow(0 0 7px rgba(255, 255, 255, 0.55));
    }

    /* ── Control Panel ────────────────────────────────────────────────────── */
    #control-panel {
      position: fixed;
      bottom: 22px;
      left: 22px;
      z-index: 900;
      background: rgba(6, 11, 26, 0.94);
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 13px;
      padding: 15px 19px;
      color: #bccde8;
      font-size: 13px;
      line-height: 1.65;
      box-shadow: 0 10px 36px rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(12px);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .cp-title {
      font-size: 11px;
      color: #ffffff;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .cp-row {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      color: #bccde8;
      font-size: 13px;
    }

    .cp-row input[type="checkbox"] {
      accent-color: #5588ff;
      width: 14px;
      height: 14px;
      cursor: pointer;
    }

    .cp-row input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 90px;
      height: 3px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.15);
      outline: none;
      cursor: pointer;
    }

    .cp-row input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: #5588ff;
      cursor: pointer;
    }

    .cp-slider-label {
      font-size: 11px;
      color: #bccde8;
    }
  </style>
</head>
<body>

<canvas id="stars"></canvas>

<div id="solar-system">
  <div id="sun"></div>
</div>

<div id="control-panel">
  <div class="cp-title">Solar System</div>
  <label class="cp-row">
    <input type="checkbox" id="pluto-planet" checked>
    <span>Pluto is a planet</span>
  </label>
  <label class="cp-row">
    <span>Speed</span>
    <span class="cp-slider-label">slow</span>
    <input type="range" id="speed-slider" min="1" max="10" value="5" step="1">
    <span class="cp-slider-label">fast</span>
  </label>
</div>

<script>
const PLANET_SIZE_SCALE = 2.5;

const PLANETS = [
  {
    name: 'Mercury',
    orbitalDays: 87.97, orbitR: 72, size: 6 * PLANET_SIZE_SCALE,
    solarDayHours: 4222.6,
    img: 'images/mercury.jpg',
  },
  {
    name: 'Venus',
    orbitalDays: 224.70, orbitR: 110, size: 10 * PLANET_SIZE_SCALE,
    solarDayHours: 2802.0,
    img: 'images/venus.jpg',
  },
  {
    name: 'Earth',
    orbitalDays: 365.25, orbitR: 150, size: 10 * PLANET_SIZE_SCALE,
    solarDayHours: 24.0,
    img: 'images/earth.jpg',
  },
  {
    name: 'Mars',
    orbitalDays: 686.97, orbitR: 192, size: 8 * PLANET_SIZE_SCALE,
    solarDayHours: 24.6598,
    img: 'images/mars.jpg',
  },
  {
    name: 'Jupiter',
    orbitalDays: 4332.59, orbitR: 248, size: 22 * PLANET_SIZE_SCALE,
    solarDayHours: 9.9250,
    img: 'images/jupiter.jpg',
  },
  {
    name: 'Saturn',
    orbitalDays: 10759.22, orbitR: 305, size: 18 * PLANET_SIZE_SCALE, hasRing: true,
    solarDayHours: 10.6562,
    img: 'images/saturn.jpg',
  },
  {
    name: 'Uranus',
    orbitalDays: 30688.5, orbitR: 358, size: 14 * PLANET_SIZE_SCALE,
    solarDayHours: 17.2400,
    img: 'images/uranus.jpg',
  },
  {
    name: 'Neptune',
    orbitalDays: 60182.0, orbitR: 404, size: 13 * PLANET_SIZE_SCALE,
    solarDayHours: 16.1100,
    img: 'images/neptune.jpg',
  },
  {
    name: 'Pluto',
    orbitalDays: 90560.0, orbitR: 444, size: 5 * PLANET_SIZE_SCALE,
    solarDayHours: 153.3,
    bg: 'radial-gradient(circle at 35% 30%, #dfc8a8, #c0a070 50%, #806040)',
  },
];

const ORBIT_Y_RATIO   = 0.55;
const MERCURY_MS      = 30_000;
const MS_PER_ORBD     = MERCURY_MS / PLANETS[0].orbitalDays;
let   speedMultiplier = 5;

// ── Stars ────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('stars');
const ctx    = canvas.getContext('2d');

function drawStars() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let i = 0; i < 240; i++) {
    const x = Math.random() * canvas.width;
    const y = Math.random() * canvas.height;
    const r = Math.random() * 1.1 + 0.2;
    const a = Math.random() * 0.65 + 0.2;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${a})`;
    ctx.fill();
  }
}
drawStars();

// ── Responsive scale ─────────────────────────────────────────────────────────
const sys = document.getElementById('solar-system');

function resize() {
  const scale = Math.min(window.innerWidth, window.innerHeight) / 940;
  sys.style.transform = `scale(${Math.min(1, scale)})`;
}
resize();
window.addEventListener('resize', () => { resize(); drawStars(); });

// ── Build DOM ─────────────────────────────────────────────────────────────────
const orbitRings = PLANETS.map(p => {
  const ring = document.createElement('div');
  ring.className = 'orbit-ring';
  ring.style.width  = p.orbitR * 2 + 'px';
  ring.style.height = p.orbitR * 2 * ORBIT_Y_RATIO + 'px';
  sys.appendChild(ring);
  return ring;
});

const planetNodes = PLANETS.map((p, i) => {
  const anchor = document.createElement('div');
  anchor.className = 'planet-anchor';

  if (p.hasRing) {
    const ringEl = document.createElement('div');
    ringEl.className = 'saturn-ring';
    const rw = p.size * 2.7;
    ringEl.style.width  = rw + 'px';
    ringEl.style.height = rw + 'px';
    anchor.appendChild(ringEl);
  }

  const planet = document.createElement('div');
  planet.className = 'planet';
  planet.style.width  = p.size + 'px';
  planet.style.height = p.size + 'px';
  if (p.img) {
    planet.style.backgroundImage    = `url('${p.img}')`;
    planet.style.backgroundSize     = 'cover';
    planet.style.backgroundRepeat   = 'repeat-x';
    planet.style.backgroundPosition = '0px 50%';
  } else {
    planet.style.background = p.bg;
  }

  anchor.appendChild(planet);
  sys.appendChild(anchor);

  const initialAngle = (i / PLANETS.length) * Math.PI * 2 - Math.PI / 2;
  const spinDurMs    = Math.max(3000, Math.min(60000, p.solarDayHours / 24 * 8000));
  const spinPxPerMs  = p.img ? p.size / spinDurMs : 0;

  return { anchor, planet, initialAngle, p, spinPxPerMs, rotOffset: 0 };
});

// ── Animation loop ────────────────────────────────────────────────────────────
const sunEl      = document.getElementById('sun');
const SUN_SIZE   = 50;
const SUN_DUR_MS = 216_000;
let   sunRotOffset = 0;

let virtualElapsed = 0;
let lastFrameTime  = performance.now();

function frame(now) {
  const dt = now - lastFrameTime;
  lastFrameTime   = now;
  virtualElapsed += dt * speedMultiplier;

  sunRotOffset = (sunRotOffset + dt * speedMultiplier * (SUN_SIZE * 2) / SUN_DUR_MS) % (SUN_SIZE * 2);
  sunEl.style.backgroundPosition = `${-sunRotOffset}px 50%`;

  planetNodes.forEach((node) => {
    const { anchor, planet, initialAngle, p } = node;
    const periodMs = p.orbitalDays * MS_PER_ORBD;
    const angle    = initialAngle + (virtualElapsed / periodMs) * Math.PI * 2;
    const x        = Math.cos(angle) * p.orbitR;
    const y        = Math.sin(angle) * p.orbitR * ORBIT_Y_RATIO;

    anchor.style.transform = `translate(${x}px, ${y}px)`;

    if (node.spinPxPerMs) {
      node.rotOffset = (node.rotOffset + dt * speedMultiplier * node.spinPxPerMs) % (p.size * 2);
      planet.style.backgroundPosition = `${-node.rotOffset}px 50%`;
    }
  });

  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);

// ── Control Panel ─────────────────────────────────────────────────────────────
const PLUTO_IDX = 8;

document.getElementById('pluto-planet').addEventListener('change', function () {
  const show = this.checked;
  planetNodes[PLUTO_IDX].anchor.style.display = show ? '' : 'none';
  orbitRings[PLUTO_IDX].style.display         = show ? '' : 'none';
});

document.getElementById('speed-slider').addEventListener('input', function () {
  speedMultiplier = parseInt(this.value);
});
</script>

</body>
</html>
